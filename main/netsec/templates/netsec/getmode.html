{% extends 'netsec/basestyle.html' %}

{% block content %}

<h2>Bandit Scanner</h2>

<form method="POST" enctype="multipart/form-data" action="{% url 'bandit_run' %}">
    {% csrf_token %}

    <label>Upload File</label>
    {{ form.file }}

    <br><br>
    <label>Git Repo URL</label>
    {{ form.git }}

    <br><br>

    <button type="submit">Run Scan</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% endblock %}
